<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orca Env Team Mid Term Schedule</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f5f5f4;
    --color-bg-tertiary: #f0eeeb;
    --color-text: #1a1a18;
    --color-text-secondary: #6b6b67;
    --color-text-muted: #9b9b96;
    --color-border: rgba(0,0,0,0.12);
    --color-border-strong: rgba(0,0,0,0.22);
    --color-info-bg: #e6f1fb;
    --color-info-text: #185fa5;
    --color-danger-bg: #fcebeb;
    --color-danger-text: #a32d2d;
    --color-danger-border: rgba(163,45,45,0.35);
    --color-today: rgba(24,95,165,0.07);
    --color-weekend-bg: #fff5f5;
    --color-weekend-hover: #ffe8e8;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-bg-secondary: #262623;
      --color-bg-tertiary: #2e2e2b;
      --color-text: #f0ede8;
      --color-text-secondary: #a0a09a;
      --color-text-muted: #6e6e68;
      --color-border: rgba(255,255,255,0.1);
      --color-border-strong: rgba(255,255,255,0.2);
      --color-info-bg: #0c3258;
      --color-info-text: #85b7eb;
      --color-danger-bg: #3a1212;
      --color-danger-text: #f09595;
      --color-danger-border: rgba(240,149,149,0.3);
      --color-today: rgba(133,183,235,0.1);
      --color-weekend-bg: #2a1a1a;
      --color-weekend-hover: #331f1f;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--color-bg-tertiary);
    color: var(--color-text);
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 i { font-size: 22px; color: var(--color-info-text); }

  /* toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .month-nav { display: flex; align-items: center; gap: 6px; }
  .month-title { font-size: 15px; font-weight: 600; color: var(--color-text); min-width: 140px; text-align: center; }
  .btn {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border-strong);
    border-radius: var(--radius-md);
    padding: 6px 11px;
    cursor: pointer;
    font-size: 13px;
    color: var(--color-text);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font);
    transition: background .12s;
  }
  .btn:hover { background: var(--color-bg-secondary); }
  .btn-primary { background: var(--color-info-bg); color: var(--color-info-text); border-color: transparent; }
  .btn-primary:hover { opacity: .85; }
  .btn-danger { border-color: var(--color-danger-border); color: var(--color-danger-text); }
  .btn-danger:hover { background: var(--color-danger-bg); }
  .view-tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab {
    background: transparent; border: none; padding: 6px 13px; cursor: pointer;
    font-size: 13px; color: var(--color-text-secondary);
    border-radius: var(--radius-md); font-family: var(--font);
  }
  .tab.active { background: var(--color-bg-secondary); color: var(--color-text); font-weight: 500; }

  /* member chips */
  .members-strip { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .member-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 6px; border-radius: 20px;
    border: 0.5px solid var(--color-border); cursor: pointer;
    font-size: 12px; color: var(--color-text-secondary);
    background: var(--color-bg); transition: background .12s;
  }
  .member-chip.active { border-color: var(--color-border-strong); color: var(--color-text); background: var(--color-bg-secondary); }
  .avatar {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; flex-shrink: 0;
  }

  /* main card */
  .card {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 14px;
  }

  /* gantt */
  .gantt-wrap { overflow-x: auto; }
  table.gantt { width: 100%; border-collapse: collapse; min-width: 760px; }
  .gantt th {
    font-size: 11px; font-weight: 500; color: var(--color-text-secondary);
    padding: 6px 3px; border-bottom: 0.5px solid var(--color-border);
    background: var(--color-bg-secondary); text-align: center; white-space: nowrap;
  }
  .gantt th.name-col {
    text-align: left; min-width: 175px; position: sticky; left: 0; z-index: 2;
    background: var(--color-bg-secondary); padding-left: 12px;
  }
  .gantt th.weekend-col { background: var(--color-weekend-bg); }
  .gantt td { padding: 3px 2px; border-bottom: 0.5px solid var(--color-border); vertical-align: middle; }
  .gantt td.name-col {
    padding: 4px 12px; position: sticky; left: 0; z-index: 1; background: var(--color-bg);
  }
  .gantt td.weekend-cell { background: var(--color-weekend-bg); }
  .gantt td.today-col { background: var(--color-today); }
  .gantt tr:last-child td { border-bottom: none; }
  .gantt tr:hover td { background: var(--color-bg-secondary); }
  .gantt tr:hover td.name-col { background: var(--color-bg-secondary); }
  .gantt tr:hover td.weekend-cell { background: var(--color-weekend-hover); }
  .day-cell { width: 27px; min-width: 27px; text-align: center; vertical-align: middle; border-right: 0.5px solid var(--color-border); }
  .gantt th.day-cell { border-right: 0.5px solid var(--color-border); }
  .bar {
    height: 18px; border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-size: 9px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; overflow: hidden;
    white-space: nowrap; padding: 0 6px;
  }
  .bar:hover { opacity: .75; }
  .task-name-cell { display: flex; align-items: center; gap: 6px; }
  .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* side panel */
  .side-panel { display: flex; gap: 12px; flex-wrap: wrap; }
  .panel-card {
    flex: 1; min-width: 210px;
    background: var(--color-bg); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg); padding: 14px 16px;
  }
  .panel-title {
    font-size: 11px; font-weight: 500; color: var(--color-text-secondary);
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em;
    display: flex; align-items: center; gap: 5px;
  }
  .task-list-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 0.5px solid var(--color-border); cursor: pointer;
  }
  .task-list-item:last-child { border-bottom: none; }
  .task-list-item:hover .task-item-name { color: var(--color-info-text); }
  .task-item-name { font-size: 13px; color: var(--color-text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .tag-high { background: #FAECE7; color: #993C1D; }
  .tag-mid  { background: #FAEEDA; color: #854F0B; }
  .tag-low  { background: #EAF3DE; color: #3B6D11; }
  .deadline-text { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; }
  .member-load-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .load-bar-bg { flex: 1; height: 8px; background: var(--color-bg-secondary); border-radius: 4px; overflow: hidden; }
  .load-bar-fill { height: 100%; border-radius: 4px; }
  .load-pct { font-size: 11px; color: var(--color-text-secondary); min-width: 42px; text-align: right; }
  .member-name-btn {
    font-size: 12px; color: var(--color-text); min-width: 52px;
    background: none; border: none; cursor: pointer; padding: 0;
    text-align: left; font-family: var(--font);
    text-decoration: underline; text-decoration-color: transparent;
    transition: text-decoration-color .15s;
  }
  .member-name-btn:hover { text-decoration-color: var(--color-text); }

  /* list view */
  .list-section { margin-bottom: 16px; }
  .list-section-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .list-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: var(--color-bg); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); margin-bottom: 6px; cursor: pointer;
  }
  .list-item:hover { background: var(--color-bg-secondary); }

  /* modals */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--color-bg); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg); padding: 22px; width: 350px; max-width: 96vw;
  }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .form-row input, .form-row select {
    width: 100%; padding: 7px 9px; font-size: 13px;
    border: 0.5px solid var(--color-border-strong); border-radius: var(--radius-md);
    background: var(--color-bg); color: var(--color-text); font-family: var(--font);
  }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--color-info-text); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  /* member editor modal */
  .member-modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .member-modal {
    background: var(--color-bg); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg); width: 540px; max-width: 96vw;
    max-height: 88vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .member-modal-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 20px; border-bottom: 0.5px solid var(--color-border); flex-shrink: 0;
  }
  .member-modal-header h3 { font-size: 15px; font-weight: 600; flex: 1; }
  .member-modal-body { overflow-y: auto; flex: 1; padding: 16px 20px; }
  .member-modal-footer {
    padding: 12px 20px; border-top: 0.5px solid var(--color-border);
    display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0;
  }
  .task-edit-card {
    border: 0.5px solid var(--color-border); border-radius: var(--radius-md);
    padding: 12px; margin-bottom: 10px; background: var(--color-bg);
  }
  .task-card-header { display: flex; align-items: center; gap: 8px; }
  .task-card-header input {
    flex: 1; padding: 5px 8px; font-size: 13px; font-weight: 500;
    border: 0.5px solid var(--color-border-strong); border-radius: var(--radius-md);
    background: var(--color-bg); color: var(--color-text); font-family: var(--font);
  }
  .task-card-header input:focus { outline: none; border-color: var(--color-info-text); }
  .task-edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
  .task-edit-field label { display: block; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
  .task-edit-field input, .task-edit-field select {
    width: 100%; padding: 5px 7px; font-size: 12px;
    border: 0.5px solid var(--color-border-strong); border-radius: var(--radius-md);
    background: var(--color-bg); color: var(--color-text); font-family: var(--font);
  }
  .task-edit-field input:focus, .task-edit-field select:focus { outline: none; border-color: var(--color-info-text); }
  .add-task-btn {
    display: flex; align-items: center; gap: 6px; width: 100%;
    padding: 9px 12px; border: 0.5px dashed var(--color-border-strong);
    border-radius: var(--radius-md); background: transparent; cursor: pointer;
    font-size: 13px; color: var(--color-text-secondary); margin-top: 10px;
    font-family: var(--font); transition: background .12s;
  }
  .add-task-btn:hover { background: var(--color-bg-secondary); color: var(--color-text); }

  .hidden { display: none !important; }
  .empty-msg { font-size: 13px; color: var(--color-text-secondary); padding: 8px 0; }
</style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-layout-grid"></i> Orca Env Team — Mid Term Schedule</h1>

  <div class="toolbar">
    <div class="month-nav">
      <button class="btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-title" id="month-title"></span>
      <button class="btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <button class="btn" onclick="gotoToday()"><i class="ti ti-calendar"></i> Today</button>
    <button class="btn btn-primary" onclick="openAddModal()"><i class="ti ti-plus"></i> Add task</button>
    <button class="btn" onclick="exportData()" title="Export as JSON"><i class="ti ti-download"></i> Export</button>
    <label class="btn" title="Import from JSON" style="cursor:pointer"><i class="ti ti-upload"></i> Import<input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)"/></label>
    <div class="view-tabs" style="margin-left:0">
      <button class="tab active" id="tab-gantt" onclick="setView('gantt')">Gantt</button>
      <button class="tab" id="tab-list" onclick="setView('list')">List</button>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <div class="members-strip" id="members-strip" style="margin-bottom:0;flex:1"></div>
    <button class="btn" onclick="openTeamModal()" style="flex-shrink:0"><i class="ti ti-users"></i> Edit team</button>
  </div>

  <div class="card" id="view-gantt">
    <div class="gantt-wrap">
      <table class="gantt" id="gantt-table"></table>
    </div>
  </div>

  <div id="view-list" class="hidden" style="margin-bottom:14px"></div>

  <div class="side-panel">
    <div class="panel-card">
      <div class="panel-title"><i class="ti ti-clock" style="font-size:13px"></i> Due soon</div>
      <div id="upcoming-list"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title">
        <i class="ti ti-chart-bar" style="font-size:13px"></i> Workload
        <span style="font-size:10px;font-weight:400;margin-left:4px;text-transform:none;letter-spacing:0">— click name to edit</span>
      </div>
      <div id="load-chart"></div>
    </div>
  </div>

  <!-- memo section -->
  <div class="panel-card" style="margin-top:14px">
    <div class="panel-title" style="margin-bottom:10px">
      <i class="ti ti-notes" style="font-size:13px"></i> Memo
      <span id="memo-saved-indicator" style="font-size:10px;font-weight:400;margin-left:8px;color:var(--color-info-text);opacity:0;transition:opacity .4s">Saved</span>
    </div>
    <textarea id="memo-area" placeholder="Leave a note for the team..." style="width:100%;min-height:90px;padding:8px 10px;font-size:13px;font-family:var(--font);border:0.5px solid var(--color-border-strong);border-radius:var(--radius-md);background:var(--color-bg);color:var(--color-text);resize:vertical;line-height:1.6;outline:none"></textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-primary" onclick="saveMemo()"><i class="ti ti-device-floppy"></i> Save memo</button>
    </div>
  </div>
</div>


<!-- team editor modal -->
<div id="team-modal" class="modal-bg hidden">
  <div class="modal" style="width:400px">
    <h3>Edit team</h3>
    <div id="team-member-list" style="margin-bottom:12px"></div>
    <button class="add-task-btn" onclick="addTeamMember()" style="margin-top:0;margin-bottom:4px"><i class="ti ti-plus"></i> Add member</button>
    <div class="modal-actions">
      <button class="btn" onclick="closeTeamModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTeam()">Save</button>
    </div>
  </div>
</div>

<!-- single task modal -->
<div id="modal" class="modal-bg hidden">
  <div class="modal">
    <h3 id="modal-title">Add task</h3>
    <div class="form-row"><label>Task name</label><input id="f-name" placeholder="Enter task name"/></div>
    <div class="form-row"><label>Assignee</label><select id="f-member"></select></div>
    <div class="form-row"><label>Start date</label><input id="f-start" type="date"/></div>
    <div class="form-row"><label>Deadline</label><input id="f-end" type="date"/></div>
    <div class="form-row"><label>Priority</label>
      <select id="f-priority">
        <option value="high">High 🔴</option>
        <option value="mid" selected>Medium 🟡</option>
        <option value="low">Low 🟢</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- member bulk editor modal -->
<div id="member-modal" class="member-modal-bg hidden">
  <div class="member-modal">
    <div class="member-modal-header">
      <div class="avatar" id="me-avatar" style="width:30px;height:30px;font-size:11px"></div>
      <h3 id="me-title"></h3>
      <button class="btn" onclick="closeMemberModal()" style="padding:4px 8px"><i class="ti ti-x"></i></button>
    </div>
    <div class="member-modal-body" id="me-body"></div>
    <div class="member-modal-footer">
      <button class="btn" onclick="closeMemberModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMemberTasks()">Save all changes</button>
    </div>
  </div>
</div>

<script>
let MEMBERS=[
  {id:'a',name:'Joseph',color:'#3266ad',bg:'#e0eaf8',initials:'JO'},
  {id:'b',name:'Sung',  color:'#1d6e4f',bg:'#d4f0e4',initials:'SU'},
  {id:'c',name:'Jiseon',color:'#993556',bg:'#f7d6e4',initials:'JS'},
  {id:'d',name:'Alex',  color:'#854F0B',bg:'#fdebc6',initials:'AL'},
  {id:'e',name:'Scott', color:'#534AB7',bg:'#e8e6fb',initials:'SC'},
];
const PRIORITY={
  high:{label:'High', cls:'tag-high',dot:'#D85A30'},
  mid: {label:'Medium',cls:'tag-mid', dot:'#EF9F27'},
  low: {label:'Low',  cls:'tag-low', dot:'#639922'},
};
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// Use browser's local clock — most reliable across all environments
const _n=new Date();
const today=new Date(_n.getFullYear(),_n.getMonth(),_n.getDate());
let curYear=today.getFullYear(), curMonth=today.getMonth();
let activeMembers=new Set(MEMBERS.map(m=>m.id));
let currentView='gantt', editId=null;

function pad(n){return String(n).padStart(2,'0');}
function dateStr(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
function parseDate(s){const[y,mo,d]=s.split('-').map(Number);return new Date(y,mo-1,d);}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function isWeekend(y,m,d){const w=new Date(y,m,d).getDay();return w===0||w===6;}

const STORAGE_KEY='team-scheduler-tasks';
const STORAGE_MEMBERS_KEY='team-scheduler-members';
const STORAGE_ID_KEY='team-scheduler-nextid';
const STORAGE_VERSION_KEY='team-scheduler-version';
const CURRENT_VERSION='v2';

const DEFAULT_TASKS=[
  {id:1,name:'Sample',member:'a',start:dateStr(curYear,curMonth,1),end:dateStr(curYear,curMonth,3),priority:'mid'},
  {id:2,name:'Sample',member:'b',start:dateStr(curYear,curMonth,1),end:dateStr(curYear,curMonth,3),priority:'mid'},
  {id:3,name:'Sample',member:'c',start:dateStr(curYear,curMonth,1),end:dateStr(curYear,curMonth,3),priority:'mid'},
  {id:4,name:'Sample',member:'d',start:dateStr(curYear,curMonth,1),end:dateStr(curYear,curMonth,3),priority:'mid'},
  {id:5,name:'Sample',member:'e',start:dateStr(curYear,curMonth,1),end:dateStr(curYear,curMonth,3),priority:'mid'},
];

const MEMBER_COLORS=[
  {color:'#3266ad',bg:'#e0eaf8'},
  {color:'#1d6e4f',bg:'#d4f0e4'},
  {color:'#993556',bg:'#f7d6e4'},
  {color:'#854F0B',bg:'#fdebc6'},
  {color:'#534AB7',bg:'#e8e6fb'},
  {color:'#b5480f',bg:'#fde8d8'},
  {color:'#0f7490',bg:'#d0f0f7'},
  {color:'#5a3ea1',bg:'#ede8fb'},
];
function loadMembers(){
  try{
    const saved=localStorage.getItem(STORAGE_MEMBERS_KEY);
    return saved?JSON.parse(saved):null;
  }catch(e){return null;}
}
function saveMembers(){
  try{localStorage.setItem(STORAGE_MEMBERS_KEY,JSON.stringify(MEMBERS));}catch(e){}
}
function getInitials(name){
  const parts=name.trim().split(/\s+/);
  if(parts.length>=2)return(parts[0][0]+parts[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}
function initStorage(){
  try{
    const ver=localStorage.getItem(STORAGE_VERSION_KEY);
    if(ver!==CURRENT_VERSION){
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_ID_KEY);
      localStorage.setItem(STORAGE_VERSION_KEY,CURRENT_VERSION);
    }
  }catch(e){}
}
function loadTasks(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    return saved?JSON.parse(saved):JSON.parse(JSON.stringify(DEFAULT_TASKS));
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_TASKS));}
}
function saveTasks(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));localStorage.setItem(STORAGE_ID_KEY,String(nextId));}catch(e){}
}
function loadNextId(){
  try{const v=localStorage.getItem(STORAGE_ID_KEY);return v?parseInt(v):6;}catch(e){return 6;}
}

initStorage();
const savedMembers=loadMembers();
if(savedMembers)MEMBERS.splice(0,MEMBERS.length,...savedMembers);
activeMembers=new Set(MEMBERS.map(m=>m.id));
let tasks=loadTasks();
let nextId=loadNextId();
let meEdits=[], meMemberId=null;

function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}render();}
function gotoToday(){curYear=today.getFullYear();curMonth=today.getMonth();render();}
function setView(v){
  currentView=v;
  document.getElementById('tab-gantt').className='tab'+(v==='gantt'?' active':'');
  document.getElementById('tab-list').className='tab'+(v==='list'?' active':'');
  document.getElementById('view-gantt').className='card'+(v==='gantt'?'':' hidden');
  document.getElementById('view-list').className=(v==='list'?'':'hidden');
  render();
}

function renderMembersStrip(){
  document.getElementById('members-strip').innerHTML=MEMBERS.map(m=>`
    <div class="member-chip${activeMembers.has(m.id)?' active':''}" onclick="toggleMember('${m.id}')">
      <div class="avatar" style="background:${m.bg};color:${m.color}">${m.initials}</div>
      <span>${m.name}</span>
    </div>`).join('');
}
function toggleMember(id){if(activeMembers.has(id)){if(activeMembers.size>1)activeMembers.delete(id);}else activeMembers.add(id);render();}

function renderGantt(){
  const days=daysInMonth(curYear,curMonth);
  const todayStr=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const byMember={};
  MEMBERS.forEach(m=>{if(activeMembers.has(m.id))byMember[m.id]=[];});
  tasks.filter(t=>activeMembers.has(t.member)).forEach(t=>{if(byMember[t.member])byMember[t.member].push(t);});

  let hdr=`<thead><tr><th class="name-col">Task</th>`;
  for(let d=1;d<=days;d++){
    const isT=dateStr(curYear,curMonth,d)===todayStr;
    const we=isWeekend(curYear,curMonth,d);
    hdr+=`<th class="day-cell${we?' weekend-col':''}${isT?' today-col':''}">
      <span style="${we?'color:#E24B4A':''}${isT?';font-weight:700;color:#185fa5':''}">${d}</span></th>`;
  }
  hdr+=`</tr></thead>`;

  let body='<tbody>';
  MEMBERS.forEach(m=>{
    if(!activeMembers.has(m.id))return;
    const mt=byMember[m.id];
    if(!mt.length){
      body+=`<tr><td class="name-col" colspan="${days+1}"><div class="task-name-cell">
        <div class="avatar" style="background:${m.bg};color:${m.color};width:20px;height:20px;font-size:9px">${m.initials}</div>
        <span style="font-size:12px;color:var(--color-text-secondary)">${m.name}</span>
      </div></td></tr>`;
      return;
    }
    mt.forEach((t,i)=>{
      const tS=parseDate(t.start),tE=parseDate(t.end);
      const mS=new Date(curYear,curMonth,1),mE=new Date(curYear,curMonth,days);
      const eS=tS<mS?mS:tS, eE=tE>mE?mE:tE;
      const s=eS.getDate(), e=eE.getDate();
      let cells=''; let d=1;
      while(d<=days){
        const isT=dateStr(curYear,curMonth,d)===todayStr;
        const we=isWeekend(curYear,curMonth,d);
        if(we){cells+=`<td class="day-cell weekend-cell"></td>`;d++;continue;}
        if(d<s||d>e){cells+=`<td class="day-cell${isT?' today-col':''}"></td>`;d++;continue;}
        let re=d;
        while(re<e){const nx=re+1;if(isWeekend(curYear,curMonth,nx))break;re=nx;}
        const span=re-d+1;
        const isFl=tE.getFullYear()===curYear&&tE.getMonth()===curMonth&&tE.getDate()===e&&re===e;
        cells+=`<td class="day-cell${isT?' today-col':''}" colspan="${span}" style="padding:2px 1px">
          <div class="bar" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}40"
            title="${t.name} (${t.start} → ${t.end})" onclick="openEditModal(${t.id})">
            ${isFl?'🏁 ':''}<span style="overflow:hidden;text-overflow:ellipsis;font-size:9px">${t.name}</span>
          </div></td>`;
        d=re+1;
      }
      body+=`<tr><td class="name-col"><div class="task-name-cell">
        ${i===0?`<div class="avatar" style="background:${m.bg};color:${m.color};width:20px;height:20px;font-size:8px">${m.initials}</div>`:'<div style="width:20px"></div>'}
        <div class="priority-dot" style="background:${PRIORITY[t.priority].dot}"></div>
        <span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px" title="${t.name}">${t.name}</span>
      </div></td>${cells}</tr>`;
    });
  });
  body+='</tbody>';
  document.getElementById('gantt-table').innerHTML=hdr+body;
}

function renderList(){
  const el=document.getElementById('view-list');
  const filtered=tasks.filter(t=>activeMembers.has(t.member)).sort((a,b)=>{const po={high:0,mid:1,low:2};return po[a.priority]-po[b.priority]||(a.end>b.end?1:-1);});
  const grouped={high:[],mid:[],low:[]};
  filtered.forEach(t=>grouped[t.priority].push(t));
  let html='';
  ['high','mid','low'].forEach(p=>{
    if(!grouped[p].length)return;
    const pi=PRIORITY[p];
    html+=`<div class="list-section"><div class="list-section-title"><div style="width:8px;height:8px;border-radius:50%;background:${pi.dot}"></div>${pi.label} priority</div>`;
    grouped[p].forEach(t=>{
      const m=MEMBERS.find(x=>x.id===t.member);
      html+=`<div class="list-item" onclick="openEditModal(${t.id})">
        <div class="avatar" style="background:${m.bg};color:${m.color};width:26px;height:26px;font-size:10px">${m.initials}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${m.name} · ${t.start} → ${t.end}</div>
        </div>
        <span class="tag ${pi.cls}">${pi.label}</span>
        <button class="btn btn-danger" style="padding:3px 7px;font-size:11px" onclick="event.stopPropagation();deleteTask(${t.id})"><i class="ti ti-trash"></i></button>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html||'<p class="empty-msg">No tasks found.</p>';
}

function renderUpcoming(){
  const tTs=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const soon=tasks.filter(t=>{const diff=(parseDate(t.end)-tTs)/864e5;return diff>=0&&diff<=7&&activeMembers.has(t.member);}).sort((a,b)=>a.end>b.end?1:-1).slice(0,5);
  const el=document.getElementById('upcoming-list');
  if(!soon.length){el.innerHTML='<p class="empty-msg">No deadlines in the next 7 days.</p>';return;}
  el.innerHTML=soon.map(t=>{
    const m=MEMBERS.find(x=>x.id===t.member);
    const diff=Math.round((parseDate(t.end)-tTs)/864e5);
    return`<div class="task-list-item" onclick="openEditModal(${t.id})">
      <div class="avatar" style="background:${m.bg};color:${m.color};width:22px;height:22px;font-size:9px">${m.initials}</div>
      <span class="task-item-name">${t.name}</span>
      <span class="tag ${PRIORITY[t.priority].cls}">${PRIORITY[t.priority].label}</span>
      <span class="deadline-text">${diff===0?'Today':diff===1?'Tomorrow':diff+' days'}</span>
    </div>`;
  }).join('');
}

function renderLoad(){
  const counts={};
  MEMBERS.forEach(m=>counts[m.id]=0);
  tasks.forEach(t=>{if(counts[t.member]!==undefined)counts[t.member]++;});
  const max=Math.max(...Object.values(counts),1);
  document.getElementById('load-chart').innerHTML=MEMBERS.filter(m=>activeMembers.has(m.id)).map(m=>`
    <div class="member-load-row">
      <div class="avatar" style="background:${m.bg};color:${m.color};width:22px;height:22px;font-size:8px;flex-shrink:0">${m.initials}</div>
      <button class="member-name-btn" onclick="openMemberModal('${m.id}')">${m.name}</button>
      <div class="load-bar-bg"><div class="load-bar-fill" style="width:${Math.round(counts[m.id]/max*100)}%;background:${m.color}"></div></div>
      <span class="load-pct">${counts[m.id]} task${counts[m.id]!==1?'s':''}</span>
    </div>`).join('');
}

function render(){
  saveTasks();
  document.getElementById('month-title').textContent=`${MONTHS[curMonth]} ${curYear}`;
  renderMembersStrip();
  renderGantt();
  renderList();
  renderUpcoming();
  renderLoad();
}

/* member bulk editor */
function openMemberModal(mid){
  meMemberId=mid;
  const m=MEMBERS.find(x=>x.id===mid);
  const av=document.getElementById('me-avatar');
  av.textContent=m.initials; av.style.background=m.bg; av.style.color=m.color;
  document.getElementById('me-title').textContent=m.name+"'s tasks";
  meEdits=tasks.filter(t=>t.member===mid).map(t=>({...t,_delete:false}));
  renderMemberEditor();
  document.getElementById('member-modal').className='member-modal-bg';
}
function renderMemberEditor(){
  const body=document.getElementById('me-body');
  const active=meEdits.filter(e=>!e._delete);
  let html=active.length?'':'<p class="empty-msg" style="margin-bottom:12px">No tasks assigned yet.</p>';
  meEdits.forEach((t,i)=>{
    if(t._delete)return;
    html+=`<div class="task-edit-card" id="tec-${i}">
      <div class="task-card-header">
        <div class="priority-dot" style="background:${PRIORITY[t.priority].dot};width:8px;height:8px;flex-shrink:0"></div>
        <input value="${t.name}" placeholder="Task name" oninput="meEdits[${i}].name=this.value" style="font-weight:500"/>
        <button class="btn btn-danger" style="padding:3px 7px;font-size:11px;flex-shrink:0" onclick="markDelete(${i})" title="Delete"><i class="ti ti-trash"></i></button>
      </div>
      <div class="task-edit-row">
        <div class="task-edit-field"><label>Start</label><input type="date" value="${t.start}" onchange="meEdits[${i}].start=this.value"/></div>
        <div class="task-edit-field"><label>Deadline</label><input type="date" value="${t.end}" onchange="meEdits[${i}].end=this.value"/></div>
        <div class="task-edit-field"><label>Priority</label>
          <select onchange="meEdits[${i}].priority=this.value;renderMemberEditor()">
            <option value="high"${t.priority==='high'?' selected':''}>High 🔴</option>
            <option value="mid"${t.priority==='mid'?' selected':''}>Medium 🟡</option>
            <option value="low"${t.priority==='low'?' selected':''}>Low 🟢</option>
          </select>
        </div>
      </div>
    </div>`;
  });
  body.innerHTML=html;
  const addBtn=document.createElement('button');
  addBtn.className='add-task-btn';
  addBtn.innerHTML='<i class="ti ti-plus"></i> Add new task';
  addBtn.onclick=addMeTask;
  body.appendChild(addBtn);
}
function markDelete(i){meEdits[i]._delete=true;renderMemberEditor();}
function addMeTask(){
  const d=today.getDate();
  meEdits.push({id:nextId++,name:'New task',member:meMemberId,
    start:dateStr(curYear,curMonth,d),
    end:dateStr(curYear,curMonth,Math.min(d+6,daysInMonth(curYear,curMonth))),
    priority:'mid',_delete:false});
  renderMemberEditor();
  setTimeout(()=>document.getElementById('me-body').scrollTop=9999,50);
}
function saveMemberTasks(){
  tasks=tasks.filter(t=>t.member!==meMemberId);
  meEdits.filter(e=>!e._delete&&e.name.trim()).forEach(e=>{const{_delete,...c}=e;tasks.push(c);});
  closeMemberModal(); render();
}
function closeMemberModal(){document.getElementById('member-modal').className='member-modal-bg hidden';meEdits=[];meMemberId=null;}

/* single task modal */
function openAddModal(){
  editId=null;
  document.getElementById('modal-title').textContent='Add task';
  document.getElementById('f-name').value='';
  const d=today.getDate();
  document.getElementById('f-start').value=dateStr(curYear,curMonth,d);
  document.getElementById('f-end').value=dateStr(curYear,curMonth,Math.min(d+6,daysInMonth(curYear,curMonth)));
  document.getElementById('f-priority').value='mid';
  populateMemberSelect();
  document.getElementById('modal').className='modal-bg';
}
function openEditModal(id){
  const t=tasks.find(x=>x.id===id); if(!t)return;
  editId=id;
  document.getElementById('modal-title').textContent='Edit task';
  document.getElementById('f-name').value=t.name;
  document.getElementById('f-start').value=t.start;
  document.getElementById('f-end').value=t.end;
  document.getElementById('f-priority').value=t.priority;
  populateMemberSelect(t.member);
  document.getElementById('modal').className='modal-bg';
}
function closeModal(){document.getElementById('modal').className='modal-bg hidden';}
function populateMemberSelect(sel){
  document.getElementById('f-member').innerHTML=MEMBERS.map(m=>`<option value="${m.id}"${sel===m.id?' selected':''}>${m.name}</option>`).join('');
}
function saveTask(){
  const name=document.getElementById('f-name').value.trim(); if(!name)return;
  const t={id:editId||nextId++,name,member:document.getElementById('f-member').value,
    start:document.getElementById('f-start').value,end:document.getElementById('f-end').value,
    priority:document.getElementById('f-priority').value};
  if(editId){const i=tasks.findIndex(x=>x.id===editId);if(i>=0)tasks[i]=t;}
  else tasks.push(t);
  closeModal(); render();
}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);render();}



const STORAGE_MEMO_KEY='team-scheduler-memo';
function loadMemo(){try{return localStorage.getItem(STORAGE_MEMO_KEY)||'';}catch(e){return '';}}
function saveMemo(){
  const v=document.getElementById('memo-area').value;
  try{localStorage.setItem(STORAGE_MEMO_KEY,v);}catch(e){}
  const ind=document.getElementById('memo-saved-indicator');
  ind.style.opacity='1';
  setTimeout(()=>ind.style.opacity='0',1800);
}


function exportData(){
  const payload={version:CURRENT_VERSION,exportedAt:new Date().toISOString(),tasks,nextId,memo:document.getElementById('memo-area').value};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`team-scheduler-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.tasks||!Array.isArray(data.tasks))throw new Error('Invalid format');
      if(!confirm('Import this file? Current data will be replaced.'))return;
      tasks=data.tasks;
      nextId=data.nextId||tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
      if(data.memo){
        document.getElementById('memo-area').value=data.memo;
        try{localStorage.setItem(STORAGE_MEMO_KEY,data.memo);}catch(err){}
      }
      saveTasks();
      render();
      showToast('Import successful');
    }catch(err){
      alert('Failed to import: '+err.message);
    }
    e.target.value='';
  };
  reader.readAsText(file);
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--color-text);color:var(--color-bg);font-size:13px;padding:8px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;font-family:var(--font)';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2000);
}


/* ── team editor ── */
let teamEdits=[];

function openTeamModal(){
  teamEdits=MEMBERS.map(m=>({...m}));
  renderTeamEditor();
  document.getElementById('team-modal').className='modal-bg';
}
function closeTeamModal(){
  document.getElementById('team-modal').className='modal-bg hidden';
}
function renderTeamEditor(){
  const el=document.getElementById('team-member-list');
  el.innerHTML=teamEdits.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="avatar" style="background:${m.bg};color:${m.color};width:28px;height:28px;font-size:10px;flex-shrink:0">${m.initials}</div>
      <input value="${m.name}" placeholder="Name"
        oninput="teamEdits[${i}].name=this.value;teamEdits[${i}].initials=getInitials(this.value);renderTeamEditor()"
        style="flex:1;padding:6px 8px;font-size:13px;border:0.5px solid var(--color-border-strong);border-radius:var(--radius-md);background:var(--color-bg);color:var(--color-text);font-family:var(--font)"/>
      <select onchange="applyMemberColor(${i},this.value)" style="padding:5px 6px;font-size:12px;border:0.5px solid var(--color-border-strong);border-radius:var(--radius-md);background:var(--color-bg);color:var(--color-text);font-family:var(--font)">
        ${MEMBER_COLORS.map((c,ci)=>`<option value="${ci}"${m.color===c.color?' selected':''}>${['Blue','Green','Pink','Orange','Purple','Coral','Teal','Violet'][ci]}</option>`).join('')}
      </select>
      ${teamEdits.length>1?`<button class="btn btn-danger" style="padding:3px 7px;font-size:11px;flex-shrink:0" onclick="removeTeamMember(${i})"><i class="ti ti-trash"></i></button>`:'<div style="width:34px"></div>'}
    </div>`).join('');
}
function applyMemberColor(i,ci){
  const c=MEMBER_COLORS[parseInt(ci)];
  teamEdits[i].color=c.color;
  teamEdits[i].bg=c.bg;
  renderTeamEditor();
}
function addTeamMember(){
  const usedColors=teamEdits.map(m=>m.color);
  const c=MEMBER_COLORS.find(c=>!usedColors.includes(c.color))||MEMBER_COLORS[teamEdits.length%MEMBER_COLORS.length];
  const newId='m'+Date.now();
  teamEdits.push({id:newId,name:'New member',color:c.color,bg:c.bg,initials:'NM'});
  renderTeamEditor();
}
function removeTeamMember(i){
  if(teamEdits.length<=1)return;
  teamEdits.splice(i,1);
  renderTeamEditor();
}
function saveTeam(){
  const valid=teamEdits.filter(m=>m.name.trim());
  if(!valid.length)return;
  // reassign MEMBERS in place
  MEMBERS.splice(0,MEMBERS.length,...valid.map(m=>({...m,name:m.name.trim(),initials:getInitials(m.name)})));
  // remove tasks for deleted members
  const ids=new Set(MEMBERS.map(m=>m.id));
  tasks=tasks.filter(t=>ids.has(t.member));
  // reset activeMembers
  activeMembers=new Set(MEMBERS.map(m=>m.id));
  saveMembers();
  saveTasks();
  closeTeamModal();
  populateMemberSelect();
  render();
  showToast('Team updated');
}

populateMemberSelect();
document.getElementById('memo-area').value=loadMemo();
render();
</script>
